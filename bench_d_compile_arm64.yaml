mode: docker_task
api_base: "http://localhost:1234/v1"
models:
  - "google/gemma-4-26b-a4b"
  - "lmstudio-community/gemma-4-31b-it"
  - "unsloth/gemma-4-26b-a4b-it"
  - "unsloth/gemma-4-31b-it"

benchmark:
  spec: "benchmarks/d_compile/spec.yaml"
  answer_key: "benchmarks/d_compile/spec.answers.yaml"
  question_timeout_sec: 600
  ghidra_tool_mode: unrestricted

docker:
  image: "local-llm-bench:bench"
  platform: "linux/arm64"
  lmstudio_base_url: "http://host.docker.internal:1234/v1"

request:
  temperature: 0.0
  max_tokens: 131072

runs:
  cold_runs: 1
  warm_runs: 3
  timeout_sec: 600
  cooldown_sec: 0

output:
  history_json: "runs/history.json"
  latest_json: "runs/latest_run.json"
  report_html: "docs/index.html"
