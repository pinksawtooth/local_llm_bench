provider: lmstudio
api_base: "http://localhost:1234/v1"
models:
  - "google/gemma-4-26b-a4b"
  - "lmstudio-community/gemma-4-31b-it"
  - "unsloth/gemma-4-26b-a4b-it"
  - "unsloth/gemma-4-31b-it"

prompt:
  text: "pythonでライブラリを使わずにRC4を実装して"

request:
  temperature: 0.0
  max_tokens: 131072

runs:
  cold_runs: 1
  warm_runs: 10
  timeout_sec: 600
  cooldown_sec: 0

output:
  history_json: "runs/history.json"
  latest_json: "runs/latest_run.json"
  report_html: "docs/index.html"
